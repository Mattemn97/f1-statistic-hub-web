<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Web Dashboard Client</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="leaderboard-container">
        <h2>Live Timing <span style="color:red; font-size:14px; animation: blink 1s infinite;">• LIVE</span></h2>
        <table id="timing-table">
            <thead>
                <tr>
                    <th>P</th>
                    <th>Pilota</th>
                    <th>Gap (Lead)</th>
                    <th>Gap (Prev)</th>
                    <th>Gomma</th>
                    <th>Last Lap</th>
                    <th>Best Lap</th>
                    <th>S1</th>
                    <th>S2</th>
                    <th>S3</th>
                </tr>
            </thead>
            <tbody id="timing-body">
                </tbody>
        </table>
    </div>

    <div class="telemetry-container">
        <div style="padding: 5px; background: #000;">
            <strong>Telemetria (Selezionati max 3):</strong> Esempio Dati
            <br><small>Asse X: Distanza in metri (Curve indicate come picchi di frenata)</small>
        </div>
        
        <div class="chart-box"><canvas id="speedChart"></canvas></div>
        <div class="chart-box"><canvas id="throttleBrakeChart"></canvas></div>
        <div class="chart-box"><canvas id="gearRpmChart"></canvas></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
